# ============================================
#  🚀 MLOps CI/CD Pipeline
#  House Price Prediction API
# ============================================
name: 🤖 MLOps CI/CD Pipeline

# Trigger the workflow on these events
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:        # Allow manual trigger from GitHub UI

# Global environment variables
env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE_NAME: house-price-api
  REGISTRY: docker.io

jobs:
  # ============================================
  # JOB 1: Lint & Test
  # ============================================
  lint-and-test:
    name: 🧹 Lint & 🧪 Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: 🧹 Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other issues as warnings only
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: 🧠 Train ML model (validate training pipeline)
        run: |
          python train/train_model.py

      - name: 🧪 Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: 📊 Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: 📦 Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: app/model.pkl
          retention-days: 30

  # ============================================
  # JOB 2: Build & Push Docker Image
  # ============================================
  build-and-push:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: lint-and-test            # Only run if tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: app/

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=raw,value=v1.0.${{ github.run_number }}

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Image digest
        run: echo "🎉 Image pushed - digest ${{ steps.meta.outputs.tags }}"

  # ============================================
  # JOB 3: Deploy (Optional - Render)
  # ============================================
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 🚀 Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✅ Deployment triggered on Render!"

  # ============================================
  # JOB 4: Notify on Success
  # ============================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-and-push, deploy]
    if: always()

    steps:
      - name: 📢 Pipeline Summary
        run: |
          echo "## 🎯 Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Lint & Test: ${{ needs.lint-and-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker Build: ${{ needs.build-and-push.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Deploy: ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 Image: \`${{ secrets.DOCKERHUB_USERNAME }}/house-price-api:latest\`" >> $GITHUB_STEP_SUMMARY